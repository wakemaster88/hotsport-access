# /etc/hotsport-access/config.toml
#
# **Bootstrap-Konfiguration** – nur die minimalen Identitäts- und Hub-Daten.
# Alles andere (API-URL, Token, GPIO-Pins, Reader-Modus, interface_id,
# inout-Richtung) wird im Hub-Dashboard konfiguriert und vom Pi automatisch
# bei jedem Heartbeat angewendet.
#
# Diese Datei wird vom App-Update NIE überschrieben.

# Eindeutige ID des Pis. Vorschlag: hostname oder Drehkreuz-Nummer.
pi_id     = "pi-eingang-nord"
name      = "Eingang Nord"
location  = "hotsport"

# Verzeichnis für SQLite-State + Live-Config-Cache.
# Muss beschreibbar sein, auch wenn / read-only ist.
state_dir = "/var/lib/hotsport-access"

# Lokaler Health-Endpunkt (für systemd & Updater) – nur Loopback.
health_bind_host = "127.0.0.1"
health_bind_port = 8765

[hub]
base_url                       = "http://hub.local:8000"
pi_token                       = "BITTE-EINTRAGEN"   # = HOTSPORT_HUB_PI_TOKEN auf dem Hub
heartbeat_interval_seconds     = 5.0
update_check_interval_seconds  = 30.0
